apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  labels:
    build: art-build-history
  name: art-build-history
spec:
  failedBuildsHistoryLimit: 5
  nodeSelector: null
  output:
    to:
      kind: ImageStreamTag
      name: art-build-history:latest
  runPolicy: Serial
  source:
    git:
      uri: https://github.com/openshift-eng/art-dashboard-ui.git
      ref: art-build-history
    type: Git
  strategy:
    dockerStrategy:
      dockerfilePath: docker/Dockerfile
      from:
        kind: ImageStreamTag
        name: art-build-history:base
    type: Docker
  successfulBuildsHistoryLimit: 5
  triggers:
  - type: ConfigChange
  - imageChange:
      from:
        kind: ImageStreamTag
        name: art-build-history:base
    type: ImageChange
